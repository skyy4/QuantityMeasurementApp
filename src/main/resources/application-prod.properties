server.port=${PORT:8080}

# Database configuration for deployed environments.
# Render should supply the PostgreSQL connection details via env vars.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false

# H2 console should stay off in deployed environments.
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}

# Logging Configuration
logging.level.com.bridgelabz.quantitymeasurement=INFO

# ---- JWT Configuration ----
# You MUST set this environment variable on your deployment platform!
app.jwt.secret=${APP_JWT_SECRET:E9RuV5Kuiboi4MiJzXaZraeFNtLQ6YVQa6wAM+b/HmvamAKPUlDh/ZXG3pX9QYUzFQ55fCO/UsuLLmGhNMsD9g==}
app.jwt.expiration-ms=86400000

# ---- CORS Configuration ----
# Set this to your frontend URL in production
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}
