server.port=${PORT:8080}

# Database Configuration (PostgreSQL for many platforms, or H2)
# If using Render/Heroku, they provide DATABASE_URL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/quantitymeasurementdb;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Logging Configuration
logging.level.com.bridgelabz.quantitymeasurement=INFO

# ---- JWT Configuration ----
# You MUST set this environment variable on your deployment platform!
app.jwt.secret=${APP_JWT_SECRET:E9RuV5Kuiboi4MiJzXaZraeFNtLQ6YVQa6wAM+b/HmvamAKPUlDh/ZXG3pX9QYUzFQ55fCO/UsuLLmGhNMsD9g==}
app.jwt.expiration-ms=86400000

# ---- CORS Configuration ----
# Set this to your frontend URL in production
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}
