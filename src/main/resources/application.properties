spring.application.name=quantity-measurement-app

# Railway injects PORT — bind to it
server.port=${PORT:8080}

# Database configuration.
# Defaults to local H2 for development, but can be overridden on Render with
# SPRING_DATASOURCE_URL / USERNAME / PASSWORD / DRIVER_CLASS_NAME.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# H2 Console Configuration
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.h2.console.settings.trace=false

# Never use 'create' in deployed environments unless you explicitly want to wipe data.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.com.bridgelabz.quantitymeasurement=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics

# ---- JWT Configuration ----
app.jwt.secret=E9RuV5Kuiboi4MiJzXaZraeFNtLQ6YVQa6wAM+b/HmvamAKPUlDh/ZXG3pX9QYUzFQ55fCO/UsuLLmGhNMsD9g==
app.jwt.expiration-ms=86400000

# ---- CORS Configuration ----
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://qma-frontend.onrender.com,https://quantitymeasurementapp-frontend-s49x.onrender.com}
