server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:3000,https://*.railway.app,https://*.onrender.com}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: false
      routes:
        # AUTH_SERVICE_URI → Render URL e.g. https://auth-service-xxxx.onrender.com
        - id: auth-service-route
          uri: ${AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/auth/**,/api/users/**
        # QMA_SERVICE_URI → Railway internal/public URL of qma-service
        - id: qma-service-route
          uri: ${QMA_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/quantities/**
        # HISTORY_SERVICE_URI → Render URL e.g. https://history-service-xxxx.onrender.com
        - id: history-service-route
          uri: ${HISTORY_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/history/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
