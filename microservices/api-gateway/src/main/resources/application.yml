server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://*.railway.app,https://*.onrender.com}}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: ${APP_CORS_ALLOW_CREDENTIALS:false}
      routes:
        - id: auth-service-route
          uri: ${AUTH_SERVICE_URI:lb://auth-service}
          predicates:
            - Path=/api/auth/**,/api/users/**
        - id: qma-service-route
          uri: ${QMA_SERVICE_URI:lb://qma-service}
          predicates:
            - Path=/api/v1/quantities/**
        - id: history-service-route
          uri: ${HISTORY_SERVICE_URI:lb://history-service}
          predicates:
            - Path=/api/v1/history/**

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    register-with-eureka: ${EUREKA_CLIENT_ENABLED:true}
    fetch-registry: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
