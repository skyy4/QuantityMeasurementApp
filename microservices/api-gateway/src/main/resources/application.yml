server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      # Strip duplicate CORS headers that downstream services may add
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      routes:
        # AUTH_SERVICE_URI → Render URL e.g. https://qma-auth-service.onrender.com
        - id: auth-service-route
          uri: ${AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/auth/**,/api/users/**
        # QMA_SERVICE_URI → Railway public URL of qma-service
        - id: qma-service-route
          uri: ${QMA_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/quantities/**
        # HISTORY_SERVICE_URI → Render URL e.g. https://history-service-0k2e.onrender.com
        - id: history-service-route
          uri: ${HISTORY_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/history/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://qma-frontend.onrender.com,https://quantitymeasurementapp-frontend-s49x.onrender.com}
