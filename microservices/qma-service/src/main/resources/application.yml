server:
  port: ${PORT:${SERVER_PORT:8082}}

spring:
  application:
    name: qma-service
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2s
  cache:
    type: ${SPRING_CACHE_TYPE:simple}

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-secret-key-for-railway-deployment-please-1234567890}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://*.railway.app,https://qma-frontend.onrender.com}
  cache:
    result-ttl-minutes: ${APP_CACHE_RESULT_TTL_MINUTES:30}
  history-service:
    base-url: ${HISTORY_SERVICE_BASE_URL:http://localhost:8083}
    api-key: ${HISTORY_SERVICE_API_KEY:history-service-local-key}

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    register-with-eureka: ${EUREKA_CLIENT_ENABLED:true}
    fetch-registry: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  health:
    redis:
      enabled: ${MANAGEMENT_HEALTH_REDIS_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info,metrics
